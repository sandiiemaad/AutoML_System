<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <title>AutoML App</title>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />

    <style>
        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        :root {
            --bg: #0b1220;
            --surface: #172036;
            --surface2: #1f2a44;
            --border: #31405f;

            --accent: #7dd3fc;

            --text: #e0f2fe;
            --muted: #93c5fd;

            --green: #4ade80;
            --red: #fb7185;

            --radius: 10px;
        }

        body {
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            min-height: 100vh;
            padding: 40px 20px;
        }

        .container { max-width: 820px; margin: 0 auto; }

        /* Header */
        .header { text-align: center; margin-bottom: 36px; }
        .header h1 { font-size: 28px; font-weight: 600; letter-spacing: -0.5px; }
        .header p  { color: var(--muted); font-size: 14px; margin-top: 6px; }

        /* Card */
        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 24px;
            margin-bottom: 16px;
        }
        .card-title {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--muted);
            margin-bottom: 16px;
        }

        /* Upload */
        .upload-area {
            border: 1.5px dashed var(--border);
            border-radius: var(--radius);
            padding: 28px;
            text-align: center;
            cursor: pointer;
            transition: border-color 0.2s;
            display: block;
        }
        .upload-area:hover { border-color: var(--accent); }
        .upload-area input { display: none; }
        .upload-area .icon { font-size: 28px; margin-bottom: 8px; }
        .upload-area p { color: var(--muted); font-size: 14px; }
        .upload-area strong { color: var(--text); }
        #fileName { font-family: 'DM Mono', monospace; font-size: 13px; color: var(--accent); margin-top: 10px; text-align: center; min-height: 20px; }

        /* Buttons */
        .btn {
            display: inline-flex;
            align-items: center;
            gap: 8px;
            padding: 10px 20px;
            border: none;
            border-radius: var(--radius);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        .btn:hover            { opacity: 0.85; }
        .btn:disabled         { opacity: 0.4; cursor: not-allowed; }
        .btn-primary          { background: var(--accent); color: #fff; }
        .btn-success          { background: #1a4731; color: var(--green); border: 1px solid #2ea04326; }
        .btn-ghost            { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
        .btn-row              { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 16px; }

        /* Fields */
        .field        { margin-bottom: 16px; }
        .field label  { font-size: 13px; font-weight: 500; color: var(--muted); display: block; margin-bottom: 4px; }
        select {
            width: 100%;
            padding: 10px 12px;
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            color: var(--text);
            font-family: 'DM Sans', sans-serif;
            font-size: 14px;
            outline: none;
        }
        select:focus { border-color: var(--accent); }

        /* Loading */
        #loadingMsg { display: none; text-align: center; color: var(--muted); font-size: 14px; padding: 12px 0; }
        .spinner {
            display: inline-block;
            width: 14px; height: 14px;
            border: 2px solid var(--border);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 0.7s linear infinite;
            margin-right: 6px;
            vertical-align: middle;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        /* Tables */
        .table-wrap { overflow-x: auto; border-radius: var(--radius); border: 1px solid var(--border); }
        table { width: 100%; border-collapse: collapse; font-size: 13px; }
        thead th {
            background: var(--surface2);
            padding: 10px 14px;
            text-align: left;
            font-weight: 600;
            color: var(--muted);
            border-bottom: 1px solid var(--border);
            white-space: nowrap;
        }
        tbody td {
            padding: 9px 14px;
            border-bottom: 1px solid var(--border);
            font-family: 'DM Mono', monospace;
            font-size: 12px;
            white-space: nowrap;
        }
        tbody tr:last-child td { border-bottom: none; }
        tbody tr:hover { background: var(--surface2); }

        /* Summary list */
        .summary-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 8px;
        }
        .summary-item {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 10px 14px;
            font-size: 13px;
        }
        .summary-item .s-label {
            font-size: 11px;
            color: var(--muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 3px;
        }

        /* Results */
        #resultsContainer { display: none; }
        .metric-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
            gap: 12px;
            margin-bottom: 20px;
        }
        .metric-card {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 18px 14px;
            text-align: center;
        }
        .metric-card .val { font-size: 26px; font-weight: 600; color: var(--accent); font-family: 'DM Mono', monospace; }
        .metric-card .lbl { font-size: 12px; color: var(--muted); margin-top: 4px; }

        .best-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            background: #1e1a40;
            border: 1px solid #3d3580;
            color: #a89ff7;
            padding: 6px 14px;
            border-radius: 20px;
            font-size: 13px;
            font-weight: 500;
            margin-bottom: 20px;
        }

        .section-label {
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.8px;
            color: var(--muted);
            margin: 20px 0 10px;
        }

        .cm-table thead th { text-align: center; }
        .cm-table tbody td { text-align: center; font-weight: 600; font-size: 15px; }

        .hidden { display: none !important; }
    </style>
</head>

<body>
<div class="container">

    <div class="header">
        <h1>AutoML System</h1>
        <p>Upload a dataset, choose a task, and get a trained model — no code required.</p>
    </div>

    <!-- Step 1 -->
    <div class="card">
        <div class="card-title">Step 1 — Upload Dataset</div>
        <label class="upload-area">
            <input type="file" id="fileInput" onchange="showFileName()" accept=".csv,.xlsx" />
            
            <p><strong>Click to choose a file</strong></p>
            <p>.csv or .xlsx supported</p>
        </label>
        <div id="fileName"></div>
        <div class="btn-row">
            <button class="btn btn-primary" onclick="uploadFile()">Upload</button>
        </div>
    </div>

    <!-- Step 2 -->
    <div class="card hidden" id="configCard">
        <div class="card-title">Step 2 — Configure & Train</div>

        <div class="field">
            <label>ML Task</label>
            <select id="mlTask" onchange="handleTaskChange()">
                <option value="">-- Select Task --</option>
                <option value="classification">Classification</option>
                <option value="regression">Regression</option>
                <option value="clustering">Clustering</option>
            </select>
        </div>

        <div class="field hidden" id="targetField">
            <label>Target Column</label>
            <select id="targetCol"></select>
        </div>

        <div class="field">
            <label>Ordinal Columns <span style="font-weight:400;font-size:12px;">(Ctrl/Cmd + click to select multiple)</span></label>
            <select id="ordinalCols" multiple size="5"></select>
        </div>

        <div class="btn-row">
            <button class="btn btn-ghost" id="preBtn" onclick="runPreprocessing()">Run Preprocessing</button>
            <button class="btn btn-primary hidden" id="trainBtn" onclick="runTraining()">Train Model</button>
        </div>
        <div id="loadingMsg"><span class="spinner"></span>Training models, please wait...</div>
    </div>

    <!-- Preview -->
    <div id="previewContainer"></div>

    <!-- Results -->
    <div id="resultsContainer">
        <div class="card">
            <div class="card-title">Results</div>

            <div class="best-badge">
                <span></span><span id="bestModelBadge"></span>
            </div>

            <div class="metric-grid" id="metricGrid"></div>

            <div class="section-label">Model Comparison</div>
            <div class="table-wrap">
                <table id="compareTable"></table>
            </div>

            <div id="cmSection" class="hidden">
                <div class="section-label" style="margin-top:20px;">Confusion Matrix</div>
                <div class="table-wrap">
                    <table class="cm-table" id="cmTable"></table>
                </div>
            </div>

            <div class="btn-row" style="margin-top:20px;">
                <button class="btn btn-success" onclick="downloadModel()">Save Model (.pkl)</button>
            </div>
        </div>
    </div>

</div>
<script src="{{ url_for('static', filename='script.js') }}"></script>
<script>
function showFileName() {
    const file = document.getElementById("fileInput").files[0];
    document.getElementById("fileName").innerText = file ?  file.name : "";
}

function showTrainButton() {
    document.getElementById("trainBtn").classList.remove("hidden");
}

async function runTraining() {
    const task   = document.getElementById("mlTask").value;
    const target = document.getElementById("targetCol").value;
    if (!task) { alert("Please select an ML task first!"); return; }

    document.getElementById("loadingMsg").style.display = "block";
    document.getElementById("resultsContainer").style.display = "none";
    document.getElementById("trainBtn").disabled = true;

    try {
        const res  = await fetch("http://127.0.0.1:5000/train", {
            method: "POST",
            headers: { "Content-Type": "application/json" },
            body: JSON.stringify({ task, target_column: target })
        });
        const data = await res.json();
        if (data.error) { alert("Error: " + data.error); return; }
        displayResults(data.task, data.metrics);
    } catch (err) {
        alert("Training failed. Make sure the backend is running.");
        console.error(err);
    } finally {
        document.getElementById("loadingMsg").style.display = "none";
        document.getElementById("trainBtn").disabled = false;
    }
}

function displayResults(task, metrics) {
    document.getElementById("resultsContainer").style.display = "block";
    document.getElementById("bestModelBadge").innerText = "Best Model: " + metrics.best_model;

    const grid = document.getElementById("metricGrid");
    grid.innerHTML = "";

    let cards = [];
    if (task === "classification") {
        cards = [
            { lbl: "Accuracy",  val: (metrics.accuracy  * 100).toFixed(1) + "%" },
            { lbl: "Precision", val: (metrics.precision * 100).toFixed(1) + "%" },
            { lbl: "Recall",    val: (metrics.recall    * 100).toFixed(1) + "%" },
            { lbl: "F1-Score",  val: (metrics.f1_score  * 100).toFixed(1) + "%" },
        ];
    } else if (task === "regression") {
        cards = [
            { lbl: "R² Score", val: metrics.R2.toFixed(4) },
            { lbl: "MAE",      val: metrics.MAE.toFixed(4) },
            { lbl: "MSE",      val: metrics.MSE.toFixed(4) },
            
        ];
    } else {
        cards = [
            { lbl: "Silhouette Score", val: metrics.silhouette_score.toFixed(4) },
            { lbl: "Optimal Clusters", val: metrics.best_k }
        ];
    }

    cards.forEach(c => {
        grid.innerHTML += `<div class="metric-card"><div class="val">${c.val}</div><div class="lbl">${c.lbl}</div></div>`;
    });

    const isPercent = task === "classification";
    document.getElementById("compareTable").innerHTML = `
        <thead><tr><th>Model</th><th>Score</th></tr></thead>
        <tbody>${Object.entries(metrics.all_scores).map(([name, score]) => `
            <tr>
                <td>${name} ${name === metrics.best_model ? "" : ""}</td>
                <td>${isPercent ? (score * 100).toFixed(2) + "%" : score.toFixed(4)}</td>
            </tr>`).join("")}
        </tbody>`;

    const cmSection = document.getElementById("cmSection");
    if (task === "classification" && metrics.confusion_matrix) {
        cmSection.classList.remove("hidden");
        buildConfusionMatrix(metrics.confusion_matrix);
    } else {
        cmSection.classList.add("hidden");
    }
}

function buildConfusionMatrix(cm) {
    const n = cm.length;
    let html = `<thead><tr><th></th>${Array.from({length:n},(_,j)=>`<th>Predicted ${j}</th>`).join("")}</tr></thead><tbody>`;
    for (let i = 0; i < n; i++) {
        html += `<tr><th style="background:var(--surface2);padding:10px 14px;font-size:12px;color:var(--muted);text-align:left;">Actual ${i}</th>`;
        for (let j = 0; j < n; j++) {
            html += `<td style="color:${i===j?"var(--green)":"var(--red)"};">${cm[i][j]}</td>`;
        }
        html += `</tr>`;
    }
    document.getElementById("cmTable").innerHTML = html + `</tbody>`;
}

async function downloadModel() {
    window.location.href = "http://127.0.0.1:5000/download-model";
}
</script>
</body>
</html>
